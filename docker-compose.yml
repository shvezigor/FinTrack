services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: resource_manager
      POSTGRES_USER: resource_manager
      POSTGRES_PASSWORD: resource_manager
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resource_manager -d resource_manager"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://resource_manager:resource_manager@postgres:5432/resource_manager?schema=public
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3001}
      PUBLIC_UPLOAD_BASE_URL: ${PUBLIC_UPLOAD_BASE_URL:-http://localhost:3001}
      UPLOAD_DIR: /app/uploads
    ports:
      - "3001:3001"
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma db push && npm --workspace apps/api run start"

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://resource_manager:resource_manager@postgres:5432/resource_manager?schema=public
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    command: sh -c "npx prisma db push && npm --workspace apps/worker run start"

  dashboard:
    build:
      context: .
      dockerfile: docker/dashboard.Dockerfile
    env_file:
      - .env
    environment:
      API_INTERNAL_URL: http://api:3001
      NEXT_PUBLIC_API_PUBLIC_URL: http://localhost:3001
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started

  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --url http://api:3001
    depends_on:
      api:
        condition: service_started

volumes:
  postgres-data:
  uploads-data:
