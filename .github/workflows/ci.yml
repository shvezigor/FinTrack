name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop
      - "codex/**"

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: resource_manager_test
          POSTGRES_PASSWORD: resource_manager
          POSTGRES_USER: resource_manager
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U resource_manager -d resource_manager_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      APP_BASE_URL: http://127.0.0.1:3101
      APP_SECRET_KEY: fintrack-ci-test-secret-key
      DASHBOARD_ADMIN_PASSWORD: TestAdmin123!
      DASHBOARD_PUBLIC_URL: http://127.0.0.1:3100
      DATABASE_URL: postgresql://resource_manager:resource_manager@127.0.0.1:55432/resource_manager_test?schema=public
      DEFAULT_USER_EMAIL: admin@e2e.fintrack.test
      DEFAULT_USER_NAME: FinTrack Test Admin
      NODE_ENV: test
      SESSION_COOKIE_NAME: fintrack_e2e_session
      TELEGRAM_USE_POLLING: "false"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm run test:unit
      - name: Build
        run: npm run build
      - name: E2E tests
        run: npm run test:e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
